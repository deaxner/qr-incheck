# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.timezone: '%env(APP_TIMEZONE)%'
    app.secret: '%env(APP_SECRET)%'
    app.scanner_device_token: '%env(APP_SCANNER_DEVICE_TOKEN)%'
    app.operational_logging_enabled: '%env(bool:APP_OPERATIONAL_LOGGING_ENABLED)%'
    app.tracing_enabled: '%env(bool:APP_TRACING_ENABLED)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Clocking\Application\ScanService:
        public: true

    App\Auth\Application\JwtService:
        arguments:
            $appSecret: '%app.secret%'

    App\Auth\Application\ScannerDeviceTokenService:
        arguments:
            $configuredToken: '%app.scanner_device_token%'

    App\Auth\Http\JwtAuthSubscriber:
        arguments:
            $scanRequestLimiter: '@limiter.scan_requests'

    App\Shared\Http\OperationalEventLogger:
        arguments:
            $enabled: '%app.operational_logging_enabled%'
            $httpLogger: '@monolog.logger.http'
            $securityLogger: '@monolog.logger.security'
            $auditLogger: '@monolog.logger.audit'

    App\Shared\Observability\RequestTracingSubscriber:
        arguments:
            $enabled: '%app.tracing_enabled%'

    App\Shared\Observability\Tracing:
        arguments:
            $enabled: '%app.tracing_enabled%'

    App\Shared\Observability\MetricsCollector:
        arguments:
            $cache: '@cache.app'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
