monolog:
    channels:
        - http
        - security
        - audit
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]
            http:
                type: rotating_file
                path: "%kernel.logs_dir%/http.%kernel.environment%.log"
                level: info
                max_files: 7
                channels: [http]
                formatter: monolog.formatter.json
            security:
                type: rotating_file
                path: "%kernel.logs_dir%/security.%kernel.environment%.log"
                level: info
                max_files: 14
                channels: [security]
                formatter: monolog.formatter.json
            audit:
                type: rotating_file
                path: "%kernel.logs_dir%/audit.%kernel.environment%.log"
                level: info
                max_files: 30
                channels: [audit]
                formatter: monolog.formatter.json

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
            http:
                type: stream
                path: "%kernel.logs_dir%/http.%kernel.environment%.log"
                level: info
                channels: [http]
                formatter: monolog.formatter.json
            security:
                type: stream
                path: "%kernel.logs_dir%/security.%kernel.environment%.log"
                level: info
                channels: [security]
                formatter: monolog.formatter.json
            audit:
                type: stream
                path: "%kernel.logs_dir%/audit.%kernel.environment%.log"
                level: info
                channels: [audit]
                formatter: monolog.formatter.json

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            http:
                type: stream
                path: php://stderr
                level: info
                channels: [http]
                formatter: monolog.formatter.json
            security:
                type: stream
                path: php://stderr
                level: info
                channels: [security]
                formatter: monolog.formatter.json
            audit:
                type: stream
                path: php://stderr
                level: info
                channels: [audit]
                formatter: monolog.formatter.json
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
