services:
  scanner:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        APP_NAME: "@qr-incheck/scanner-app"
        APP_DIR: "scanner-app"
        VITE_DEVICE_TOKEN: "scanner-demo-token"
    depends_on:
      backend:
        condition: service_started
      mercure:
        condition: service_started
    environment:
      TZ: Europe/Amsterdam
    ports:
      - "8081:80"

  admin:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        APP_NAME: "@qr-incheck/admin-app"
        APP_DIR: "admin-app"
    depends_on:
      backend:
        condition: service_started
      mercure:
        condition: service_started
    environment:
      TZ: Europe/Amsterdam
    ports:
      - "8083:80"

  employee:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        APP_NAME: "@qr-incheck/employee-app"
        APP_DIR: "employee-app"
    depends_on:
      backend:
        condition: service_started
      mercure:
        condition: service_started
    environment:
      TZ: Europe/Amsterdam
    ports:
      - "8084:80"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_SECRET: demo-secret
      APP_TIMEZONE: Europe/Amsterdam
      APP_SCANNER_DEVICE_TOKEN: scanner-demo-token
      APP_REALTIME_ENABLED: 1
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: http://localhost/.well-known/mercure
      MERCURE_JWT_SECRET: demo-mercure-secret
      DATABASE_URL: mysql://qr_user:qr_password@db:3306/qr_incheck?serverVersion=8.0.36&charset=utf8mb4
      TZ: Europe/Amsterdam
    ports:
      - "8082:80"

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: demo-mercure-secret
      MERCURE_SUBSCRIBER_JWT_KEY: demo-mercure-secret
      MERCURE_EXTRA_DIRECTIVES: |
        anonymous
        cors_origins *
    command: /usr/bin/caddy run --config /etc/caddy/dev.Caddyfile
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 5s
      retries: 5
      timeout: 5s
      start_period: 20s
    volumes:
      - mercure_data:/data
      - mercure_config:/config

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: qr_incheck
      MYSQL_PASSWORD: qr_password
      TZ: Europe/Amsterdam
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: qr_user
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      retries: 20
      timeout: 5s
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  mercure_data:
  mercure_config:
